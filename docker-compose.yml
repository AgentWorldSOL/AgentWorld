version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://agentworld:agentworld@postgres:5432/agentworld
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentworld

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentworld
      POSTGRES_USER: agentworld
      POSTGRES_PASSWORD: agentworld
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentworld"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agentworld

volumes:
  pgdata:
    driver: local

networks:
  agentworld:
    driver: bridge
